name: "Notepad Basic Test"

steps:
  - action: launch_application
    app_path: "notepad.exe"
    app_title: "Notepad"
    wait_seconds: 3
    description: "Launch Notepad"

  - action: click
    target: "text editing area"
    description: "Click the text area"

  - action: type
    text: "Hello, World!"
    description: "Type test text"

  - action: verify
    target: "text containing 'Hello, World!'"
    description: "Verify text was typed"

settings:
  retry_attempts: 3
  retry_delay: 2
  fail_fast: true
